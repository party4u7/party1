<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Dzimšanas dienas ielūgums</title>

<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Manrope, sans-serif;
}

body{
    background:#070A12;
    color:white;
    overflow-x:hidden;
}

.bg{
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at 20% 20%, rgba(124,58,237,0.25), transparent 40%),
        radial-gradient(circle at 80% 80%, rgba(34,211,238,0.18), transparent 45%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05), transparent 60%);
    z-index:-1;
    filter: blur(40px);
}

/* HERO */
.hero{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:20px;
}

.hero-card{
    max-width:420px;
    animation:fadeUp 1.2s ease;
}

.tag{
    display:inline-block;
    padding:8px 14px;
    border-radius:999px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    font-size:13px;
    color:#cbd5e1;
    margin-bottom:18px;
}

h1{
    font-size:42px;
    font-weight:800;
    letter-spacing:-1px;
}

p{
    color:#aab4c5;
    margin-top:10px;
    line-height:1.5;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:14px 20px;
    border-radius:14px;
    background:linear-gradient(135deg,#7c3aed,#22d3ee);
    color:white;
    font-weight:700;
    text-decoration:none;
    box-shadow:0 10px 30px rgba(124,58,237,0.3);
    transition:0.4s;
}

.btn:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 40px rgba(124,58,237,0.4);
}

/* SECTIONS */
.section{
    padding:40px 18px;
    display:flex;
    justify-content:center;
}

.card{
    width:100%;
    max-width:420px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    padding:18px;
    backdrop-filter:blur(14px);
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
    opacity:0;
    transform:translateY(30px);
    transition:1s ease;
}

.card.show{
    opacity:1;
    transform:translateY(0);
}

h2{
    font-size:18px;
    margin-bottom:10px;
    color:#e2e8f0;
}

.small{
    color:#94a3b8;
    font-size:14px;
    line-height:1.6;
}

img{
    width:100%;
    border-radius:18px;
    margin-top:12px;
}

/* MAP */
.map{
    display:block;
    margin-top:12px;
    text-align:center;
    padding:12px;
    border-radius:14px;
    background:rgba(34,197,94,0.15);
    border:1px solid rgba(34,197,94,0.3);
    color:#22c55e;
    text-decoration:none;
    font-weight:600;
}

@keyframes fadeUp{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="bg"></div>

<!-- HERO -->
<div class="hero">
    <div class="hero-card">

        <div class="tag">🎯 Paintball dzimšanas diena</div>

        <h1>Tu esi ielūgts</h1>

        <p>
            📅 16. maijā<br>
            🕒 Būt uz vietas 15:00<br>
            📍 Jelgava, Aku ceļš 1
        </p>

        <a href="#info" class="btn">Atvērt informāciju</a>
    </div>
</div>

<!-- INFO -->
<div class="section" id="info">
    <div class="card">
        <h2>📍 Vieta</h2>
        <div class="small">
            Rullītis Paintball<br>
            Aku ceļš 1, Jelgava
        </div>

        <a class="map" target="_blank"
        href="https://www.google.com/maps/search/?api=1&query=Aku+ceļš+1+Jelgava">
        Atvērt kartē
        </a>
    </div>
</div>

<!-- DETAILS -->
<div class="section">
    <div class="card">
        <h2>✨ Kas būs</h2>
        <div class="small">
            • Paintball<br>
            • Komandu kaujas<br>
            • Adrenalīns<br>
            • Meža atmosfēra<br>
            • Foto un emocijas
        </div>
    </div>
</div>

<!-- GALLERY -->
<div class="section">
    <div class="card">
        <h2>📸 Atmosfēra</h2>

        <img src="https://www.peski13.ru/upload/iblock/2e8/018_2017_06_22_17_22_25_postnikov.jpg">
        <img src="https://aspireflb.ru/images/content/paintball/14.jpg">
        <img src="https://i.ibb.co/ZRYcgJtz/IMG-6733.jpg">
    </div>
</div>

<script>
const cards = document.querySelectorAll('.card');

const observer = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
        if(e.isIntersecting){
            e.target.classList.add('show');
        }
    });
},{threshold:0.2});

cards.forEach(c=>observer.observe(c));
</script>

</body>
</html>
